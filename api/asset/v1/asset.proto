syntax = "proto3";

package api.asset.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "kratos-template/api/asset/v1;v1";

service AssetService {
  rpc CreateAsset(CreateAssetRequest) returns (CreateAssetReply) {
    option (google.api.http) = {
      post: "/api/v1/assets"
      body: "*"
    };
  }
  
  rpc GetAsset(GetAssetRequest) returns (GetAssetReply) {
    option (google.api.http) = {
      get: "/api/v1/assets/{id}"
    };
  }
  
  rpc UpdateAsset(UpdateAssetRequest) returns (UpdateAssetReply) {
    option (google.api.http) = {
      put: "/api/v1/assets/{id}"
      body: "*"
    };
  }
  
  rpc DeleteAsset(DeleteAssetRequest) returns (DeleteAssetReply) {
    option (google.api.http) = {
      delete: "/api/v1/assets/{id}"
    };
  }
  
  rpc ListAssets(ListAssetsRequest) returns (ListAssetsReply) {
    option (google.api.http) = {
      get: "/api/v1/assets"
    };
  }
}

message Asset {
  string id = 1;
  string name = 2;
  string description = 3;
  string owner_id = 4;
  double value = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateAssetRequest {
  string name = 1;
  string description = 2;
  string owner_id = 3;
  double value = 4;
}

message CreateAssetReply {
  Asset asset = 1;
}

message GetAssetRequest {
  string id = 1;
}

message GetAssetReply {
  Asset asset = 1;
}

message UpdateAssetRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  double value = 4;
}

message UpdateAssetReply {
  Asset asset = 1;
}

message DeleteAssetRequest {
  string id = 1;
}

message DeleteAssetReply {
  bool success = 1;
}

message ListAssetsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string owner_id = 3;
}

message ListAssetsReply {
  repeated Asset assets = 1;
  int32 total = 2;
}
