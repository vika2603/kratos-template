server:
  http:
    addr: 0.0.0.0:8083
    timeout: 30s
  grpc:
    addr: 0.0.0.0:9083
    timeout: 30s

data:
  database:
    driver: postgres
    source: postgres://postgres:postgres@localhost:5432/kratos?sslmode=disable

service:
  name: asset
  version: v1.0.0

registry:
  consul:
    address: localhost:8500
    scheme: http

tracing:
  jaeger:
    endpoint: http://localhost:14268/api/traces
  sample_rate: 1.0

log:
  level: info
  env: development
