syntax = "proto3";

package kratos.api.auth.conf;

import "google/protobuf/duration.proto";

option go_package = "kratos-template/app/auth/internal/conf;conf";

// Bootstrap holds this service's private config only. Shared config
// (service / registry / log) lives in pkg/conf and is scanned separately
// by pkg/bootstrap.
message Bootstrap {
  Server server = 1;
  Data data = 2;
  Auth auth = 3;
}

message Server {
  message GRPC {
    string addr = 1;
    google.protobuf.Duration timeout = 2;
  }
  GRPC grpc = 1;
}

message Data {
  message UserService {
    // host:port (local) or discovery:///user (via registry)
    string endpoint = 1;
  }
  UserService user_service = 1;
}

message Auth {
  string jwt_secret = 1;
  int64 token_expiry = 2;
}
