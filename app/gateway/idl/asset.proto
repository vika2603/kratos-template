syntax = "proto3";

package api.gateway.v1;

import "api.proto";
import "google/protobuf/timestamp.proto";

option go_package = "/asset";

message Asset {
  string id = 1;
  string name = 2;
  string description = 3;
  string owner_id = 4;
  double value = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message ListAssetsRequest {
  int32 page = 1 [(api.query) = "page"];
  int32 page_size = 2 [(api.query) = "page_size"];
  string owner_id = 3 [(api.query) = "owner_id"];
}

message ListAssetsResponse {
  repeated Asset assets = 1;
  int64 total = 2;
}

message CreateAssetRequest {
  string name = 1 [(api.body) = "name"];
  string description = 2 [(api.body) = "description"];
  string owner_id = 3 [(api.body) = "owner_id"];
  double value = 4 [(api.body) = "value"];
}

message CreateAssetResponse {
  Asset asset = 1;
}

message GetAssetRequest {
  string id = 1 [(api.path) = "id"];
}

message GetAssetResponse {
  Asset asset = 1;
}

message UpdateAssetRequest {
  string id = 1 [(api.path) = "id"];
  string name = 2 [(api.body) = "name"];
  string description = 3 [(api.body) = "description"];
  double value = 4 [(api.body) = "value"];
}

message UpdateAssetResponse {
  Asset asset = 1;
}

message DeleteAssetRequest {
  string id = 1 [(api.path) = "id"];
}

message DeleteAssetResponse {
  bool success = 1;
}

service AssetService {
  rpc ListAssets(ListAssetsRequest) returns (ListAssetsResponse) {
    option (api.get) = "/api/v1/assets";
  }

  rpc CreateAsset(CreateAssetRequest) returns (CreateAssetResponse) {
    option (api.post) = "/api/v1/assets";
  }

  rpc GetAsset(GetAssetRequest) returns (GetAssetResponse) {
    option (api.get) = "/api/v1/assets/:id";
  }

  rpc UpdateAsset(UpdateAssetRequest) returns (UpdateAssetResponse) {
    option (api.put) = "/api/v1/assets/:id";
  }

  rpc DeleteAsset(DeleteAssetRequest) returns (DeleteAssetResponse) {
    option (api.delete) = "/api/v1/assets/:id";
  }
}
