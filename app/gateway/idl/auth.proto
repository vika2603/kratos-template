syntax = "proto3";

package api.gateway.v1;

import "api.proto";

option go_package = "/auth";

message LoginRequest {
  string username = 1 [(api.body) = "username"];
  string password = 2 [(api.body) = "password"];
}

message LoginResponse {
  string access_token = 1;
  string token_type = 2;
  int64 expires_in = 3;
}

message RefreshRequest {
  string access_token = 1 [(api.body) = "access_token"];
}

message RefreshResponse {
  string access_token = 1;
  string token_type = 2;
  int64 expires_in = 3;
}

message LogoutRequest {
  string access_token = 1 [(api.body) = "access_token"];
}

message LogoutResponse {
  bool success = 1;
}

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (api.post) = "/api/v1/auth/login";
  }

  rpc Refresh(RefreshRequest) returns (RefreshResponse) {
    option (api.post) = "/api/v1/auth/refresh";
  }

  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (api.post) = "/api/v1/auth/logout";
  }
}
