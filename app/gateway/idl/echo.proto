syntax = "proto3";

package api.gateway.v1;

import "api.proto";

option go_package = "/echo";

service EchoService {
  // Echo is a test method to echo the message.
  // ok
  rpc Echo(EchoRequest) returns (EchoResponse) {
    option (api.name) = "echo name";
    option (api.get) = "/api/v1/echo";
  }
}

message EchoRequest {
  string message = 1 [(api.query) = "message"];
}

message EchoResponse {
  string message = 1;
}
