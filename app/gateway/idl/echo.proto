syntax = "proto3";

package api.gateway.v1;

import "api.proto";

option go_package = "/echo";

message EchoRequest {
  string message = 1 [(api.body) = "message"];
}

message EchoResponse {
  string message = 1;
  int64 timestamp = 2;
}

message PingRequest {}

message PingResponse {
  string pong = 1;
}

message TimeRequest {}

message TimeResponse {
  int64 timestamp = 1;
}

service EchoService {
  rpc Echo(EchoRequest) returns (EchoResponse) {
    option (api.post) = "/api/v1/echo";
  }

  rpc Ping(PingRequest) returns (PingResponse) {
    option (api.get) = "/api/v1/ping";
  }
}
