syntax = "proto3";

package api.gateway.v1;

import "api.proto";
import "google/protobuf/timestamp.proto";

option go_package = "/user";

message User {
  string id = 1;
  string username = 2;
  string email = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message ListUsersRequest {
  int32 page = 1 [(api.query) = "page"];
  int32 page_size = 2 [(api.query) = "page_size"];
}

message ListUsersResponse {
  repeated User users = 1;
  int64 total = 2;
}

message CreateUserRequest {
  string username = 1 [(api.body) = "username"];
  string email = 2 [(api.body) = "email"];
  string password = 3 [(api.body) = "password"];
}

message CreateUserResponse {
  User user = 1;
}

message GetUserRequest {
  string id = 1 [(api.path) = "id"];
}

message GetUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  string id = 1 [(api.path) = "id"];
  string username = 2 [(api.body) = "username"];
  string email = 3 [(api.body) = "email"];
}

message UpdateUserResponse {
  User user = 1;
}

message DeleteUserRequest {
  string id = 1 [(api.path) = "id"];
}

message DeleteUserResponse {
  bool success = 1;
}

service UserService {
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (api.get) = "/api/v1/users";
  }

  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
    option (api.post) = "/api/v1/users";
  }

  rpc GetUser(GetUserRequest) returns (GetUserResponse) {
    option (api.get) = "/api/v1/users/:id";
  }

  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {
    option (api.put) = "/api/v1/users/:id";
  }

  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {
    option (api.delete) = "/api/v1/users/:id";
  }
}
