syntax = "proto3";

package kratos.api.gateway.conf;

option go_package = "kratos-template/app/gateway/internal/conf;conf";

import "pkg/conf/conf.proto";

message Bootstrap {
  Server server = 1;
  Client client = 2;
  kratos.conf.Service service = 4;
  kratos.conf.Registry registry = 5;
  kratos.conf.Log log = 7;
  Auth auth = 8;
  RateLimit rate_limit = 9;
}

message Server {
  message HTTP {
    string addr = 1;
    string timeout = 2;
  }
  HTTP http = 1;
}

message Client {
  message Endpoint {
    string discovery_name = 1;
    string timeout = 2;
  }
  Endpoint auth = 1;
  Endpoint user = 2;
}

message Auth {
  string jwt_secret = 1;
}

message RateLimit {
  int64 capacity = 1;
  int64 rate = 2;
}
