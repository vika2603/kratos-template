syntax = "proto3";

package kratos.api.user.conf;

option go_package = "kratos-template/app/user/internal/conf;conf";

import "pkg/conf/conf.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  kratos.conf.Service service = 4;
  kratos.conf.Registry registry = 5;
  kratos.conf.Log log = 7;
}

message Server {
  message HTTP {
    string addr = 1;
    string timeout = 2;
  }
  message GRPC {
    string addr = 1;
    string timeout = 2;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  Database database = 1;
}
