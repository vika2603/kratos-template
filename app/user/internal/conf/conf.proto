syntax = "proto3";

package kratos.api.user.conf;

import "google/protobuf/duration.proto";

option go_package = "kratos-template/app/user/internal/conf;conf";

// Bootstrap holds this service's private config only. Shared config
// (service / registry / log) lives in pkg/conf and is scanned separately
// by pkg/bootstrap.
message Bootstrap {
  Server server = 1;
  Data data = 2;
  Auth auth = 3;
}

message Server {
  message GRPC {
    string addr = 1;
    google.protobuf.Duration timeout = 2;
  }
  message Metrics {
    // Prometheus /metrics listen address; empty disables the endpoint.
    string addr = 1;
  }
  GRPC grpc = 1;
  Metrics metrics = 2;
}

message Data {
  message Database {
    string source = 1;
    // Pool limits; zero values fall back to template defaults (25/5/30m).
    int32 max_open_conns = 2;
    int32 max_idle_conns = 3;
    google.protobuf.Duration conn_max_lifetime = 4;
  }
  Database database = 1;
}

message Auth {
  string jwt_secret = 1;
}
