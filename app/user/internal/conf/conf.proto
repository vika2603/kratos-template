syntax = "proto3";

package kratos.api.user.conf;

option go_package = "kratos-template/app/user/internal/conf;conf";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Service service = 3;
  Registry registry = 4;
  Tracing tracing = 5;
  Log log = 6;
}

message Server {
  message HTTP {
    string addr = 1;
    string timeout = 2;
  }
  message GRPC {
    string addr = 1;
    string timeout = 2;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  Database database = 1;
}

message Service {
  string name = 1;
  string version = 2;
}

message Registry {
  message Consul {
    string address = 1;
    string scheme = 2;
  }
  Consul consul = 1;
}

message Tracing {
  message Otlp {
    string endpoint = 1;
  }
  Otlp otlp = 1;
  double sample_rate = 2;
}

message Log {
  string level = 1;
  string env = 2;
}
