syntax = "proto3";

package kratos.api.worker.conf;

option go_package = "kratos-template/app/worker/internal/conf;conf";

message Bootstrap {
  Server server = 1;
  Temporal temporal = 2;
  Service service = 3;
  Registry registry = 4;
  Tracing tracing = 5;
  Log log = 6;
}

message Server {
  message HTTP {
    string addr = 1;
    string timeout = 2;
  }
  HTTP http = 1;
}

message Temporal {
  string host_port = 1;
  string namespace = 2;
  string task_queue = 3;
  int32 max_concurrent_activities = 4;
  int32 max_concurrent_workflows = 5;
}

message Service {
  string name = 1;
  string version = 2;
}

message Registry {
  message Consul {
    string address = 1;
    string scheme = 2;
  }
  Consul consul = 1;
}

message Tracing {
  message Jaeger {
    string endpoint = 1;
  }
  Jaeger jaeger = 1;
  double sample_rate = 2;
}

message Log {
  string level = 1;
  string env = 2;
}
