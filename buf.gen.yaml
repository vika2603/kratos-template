version: v2
managed:
  enabled: false
# errors/ is a vendored copy of kratos's errors.proto for import only — its Go
# code ships inside kratos itself; regenerating it here would register
# errors/errors.proto twice in the protobuf registry and panic at startup.
inputs:
  - directory: .
    exclude_paths:
      - errors
# Output path follows each file's go_package (module prefix stripped); plugins
# run via `go tool`, pinned in go.mod.
plugins:
  - local: ["go", "tool", "protoc-gen-go"]
    out: .
    opt:
      - paths=import
      - module=kratos-template

  - local: ["go", "tool", "protoc-gen-go-grpc"]
    out: .
    opt:
      - paths=import
      - module=kratos-template
      - require_unimplemented_servers=false

  - local: ["go", "tool", "protoc-gen-go-errors"]
    out: .
    opt:
      - paths=import
      - module=kratos-template
