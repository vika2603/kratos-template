version: v2
managed:
  enabled: false
plugins:
  - local: protoc-gen-go
    out: api
    opt:
      - paths=source_relative

  - local: protoc-gen-go-grpc
    out: api
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false

  - local: protoc-gen-go-http
    out: api
    opt:
      - paths=source_relative
