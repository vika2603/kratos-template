version: v2
modules:
  # Whole repo is one module so config protos can import "pkg/conf/conf.proto".
  - path: .
lint:
  use:
    - STANDARD
  except:
    # Disabled: clash with kratos conventions (co-located config protos).
    - PACKAGE_DIRECTORY_MATCH
    - PACKAGE_VERSION_SUFFIX
    - FIELD_LOWER_SNAKE_CASE
breaking:
  use:
    - FILE
deps:
  - buf.build/googleapis/googleapis
