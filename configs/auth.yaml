service:
  name: auth
  version: v1.0.0

server:
  grpc:
    addr: 0.0.0.0:9081
    timeout: 30s

data:
  database:
    driver: postgres
    source: postgres://postgres:postgres@localhost:5432/user_db?sslmode=disable

auth:
  jwt_secret: your-secret-key-change-in-production
  token_expiry: 86400

registry:
  consul:
    address: localhost:8500
    scheme: http

log:
  level: info
  env: development
