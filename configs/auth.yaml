server:
  grpc:
    addr: 0.0.0.0:9081
    timeout: 30s

data:
  # auth owns no DB; it reaches user data via the user service. Direct host:port
  # for local runs; use "discovery:///user" when running with the registry.
  user_service:
    endpoint: 127.0.0.1:9082

auth:
  jwt_secret: your-secret-key-change-in-production
  token_expiry: 86400

# (no registry → standalone local run; set CONSUL_ADDR to register)
log:
  level: info
  env: development
