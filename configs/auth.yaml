service:
  name: auth
  version: v1.0.0

server:
  grpc:
    addr: 0.0.0.0:9081
    timeout: 30s

data:
  database:
    source: postgres://postgres:postgres@localhost:5432/user_db?sslmode=disable

auth:
  jwt_secret: your-secret-key-change-in-production
  token_expiry: 86400

# (no registry → standalone local run; set CONSUL_ADDR to register)
log:
  level: info
  env: development
