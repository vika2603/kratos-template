server:
  http:
    addr: 0.0.0.0:8089
    timeout: 30s

client:
  auth:
    discovery_name: auth
    timeout: 5s
  user:
    discovery_name: user
    timeout: 5s

registry:
  consul:
    address: localhost:8500
    scheme: http

tracing:
  otlp:
    endpoint: localhost:4317
  sample_rate: 1.0

log:
  level: info
  env: development

auth:
  jwt_secret: your-secret-key-change-in-production

rate_limit:
  capacity: 100
  rate: 10
