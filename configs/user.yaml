server:
  grpc:
    addr: 0.0.0.0:9082
    timeout: 30s
  metrics:
    addr: 0.0.0.0:9182

data:
  database:
    source: postgres://postgres:postgres@localhost:5432/user_db?sslmode=disable
    max_open_conns: 25
    max_idle_conns: 5
    conn_max_lifetime: 1800s

auth:
  jwt_secret: CHANGE_ME

# (no registry → standalone local run; set CONSUL_ADDR to register)
log:
  level: info
  env: development
