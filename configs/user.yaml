server:
  grpc:
    addr: 0.0.0.0:9082
    timeout: 30s

data:
  database:
    driver: postgres
    source: postgres://postgres:postgres@localhost:5432/kratos?sslmode=disable

registry:
  consul:
    address: localhost:8500
    scheme: http

tracing:
  otlp:
    endpoint: localhost:4317
  sample_rate: 1.0

log:
  level: info
  env: development
