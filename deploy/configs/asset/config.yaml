server:
  grpc:
    addr: 0.0.0.0:9083
    timeout: 30s

data:
  database:
    driver: postgres
    source: postgres://postgres:postgres@postgres:5432/asset_db?sslmode=disable

registry:
  consul:
    address: consul:8500
    scheme: http

tracing:
  otlp:
    endpoint: jaeger:4317
  sample_rate: 1.0

log:
  level: info
  env: development
