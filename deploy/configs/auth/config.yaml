server:
  grpc:
    addr: 0.0.0.0:9081
    timeout: 30s
  metrics:
    addr: 0.0.0.0:9181

data:
  # auth owns no DB; it resolves the user service through the registry (Consul).
  user_service:
    endpoint: discovery:///user
  redis:
    addr: redis:6379
    password: ""
    db: 0

auth:
  jwt_secret: CHANGE_ME
  access_token_expiry: 900
  refresh_token_expiry: 604800

registry:
  consul:
    address: consul:8500
    scheme: http

log:
  level: info
  env: development
