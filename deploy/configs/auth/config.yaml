server:
  grpc:
    addr: 0.0.0.0:9081
    timeout: 30s

data:
  database:
    driver: postgres
    source: postgres://postgres:postgres@postgres:5432/user_db?sslmode=disable

auth:
  jwt_secret: your-secret-key-change-in-production
  token_expiry: 86400

registry:
  consul:
    address: consul:8500
    scheme: http

tracing:
  otlp:
    endpoint: jaeger:4317
  sample_rate: 1.0

log:
  level: info
  env: development
