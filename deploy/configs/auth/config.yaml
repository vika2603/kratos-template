service:
  name: auth
  version: v1.0.0

server:
  grpc:
    addr: 0.0.0.0:9081
    timeout: 30s

data:
  # auth owns no DB; it resolves the user service through the registry (Consul).
  user_service:
    endpoint: discovery:///user

auth:
  jwt_secret: your-secret-key-change-in-production
  token_expiry: 86400

registry:
  consul:
    address: consul:8500
    scheme: http

log:
  level: info
  env: development
