service:
  name: user
  version: v1.0.0

server:
  grpc:
    addr: 0.0.0.0:9082
    timeout: 30s

data:
  database:
    driver: postgres
    source: postgres://postgres:postgres@postgres:5432/user_db?sslmode=disable

registry:
  consul:
    address: consul:8500
    scheme: http

log:
  level: info
  env: development
