server:
  http:
    addr: 0.0.0.0:8084
    timeout: 30s

temporal:
  host_port: temporal:7233
  namespace: default
  task_queue: example-task-queue
  max_concurrent_activities: 10
  max_concurrent_workflows: 10

service:
  name: worker
  version: v1.0.0

registry:
  consul:
    address: consul:8500
    scheme: http

tracing:
  jaeger:
    endpoint: http://jaeger:4317
  sample_rate: 1.0

log:
  level: info
  env: development
