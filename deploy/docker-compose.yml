services:
  postgres:
    image: postgres:15-alpine
    container_name: kratos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  consul:
    image: hashicorp/consul:1.15
    container_name: kratos-consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    volumes:
      - ./configs:/configs:ro
      - ./init-consul-config.sh:/init-consul-config.sh:ro
    post_start:
      - command: /bin/sh -c "/init-consul-config.sh"
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: kratos-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: auth
    container_name: kratos-auth
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
    ports:
      - "9081:9081"
    environment:
      - DB_DSN=postgres://postgres:postgres@postgres:5432/auth_db?sslmode=disable
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    volumes:
      - ./configs:/configs:ro
    command: ["-conf", "/configs/auth/config.yaml"]

  user:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: user
    container_name: kratos-user
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
      auth:
        condition: service_started
    ports:
      - "9082:9082"
    environment:
      - DB_DSN=postgres://postgres:postgres@postgres:5432/user_db?sslmode=disable
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    volumes:
      - ./configs:/configs:ro
    command: ["-conf", "/configs/user/config.yaml"]

  asset:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: asset
    container_name: kratos-asset
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
      auth:
        condition: service_started
    ports:
      - "9083:9083"
    environment:
      - DB_DSN=postgres://postgres:postgres@postgres:5432/asset_db?sslmode=disable
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    volumes:
      - ./configs:/configs:ro
    command: ["-conf", "/configs/asset/config.yaml"]

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: gateway
    container_name: kratos-gateway
    depends_on:
      consul:
        condition: service_healthy
      auth:
        condition: service_started
      user:
        condition: service_started
      asset:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    volumes:
      - ./configs:/configs:ro
    command: ["-conf", "/configs/gateway/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
