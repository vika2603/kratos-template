services:
  postgres:
    image: postgres:15-alpine
    container_name: kratos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  consul:
    image: hashicorp/consul:1.15
    container_name: kratos-consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      timeout: 5s
      retries: 5

  consul-init:
    image: hashicorp/consul:1.15
    container_name: kratos-consul-init
    depends_on:
      consul:
        condition: service_healthy
    environment:
      - CONSUL_ADDR=consul:8500
    volumes:
      - ./configs:/configs:ro
      - ./init-consul-config.sh:/init-consul-config.sh:ro
    entrypoint: ["/bin/sh", "/init-consul-config.sh"]

  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: kratos-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kratos-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.18.3
    container_name: kratos-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations:ro
    command:
      [
        "-path=/migrations",
        "-database=postgres://postgres:postgres@postgres:5432/user_db?sslmode=disable",
        "up"
      ]

  auth:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: auth
      args:
        VERSION: ${VERSION:-dev}
    container_name: kratos-auth
    depends_on:
      consul-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      user:
        condition: service_healthy
    ports:
      - "9081:9081"
      - "9181:9181"
    environment:
      - CONSUL_ADDR=consul:8500
      - JWT_SECRET=dev-secret-change-in-prod-32-bytes!!
      - REDIS_ADDR=redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    volumes:
      - ./configs:/configs:ro
    command: ["-conf", "/configs/auth/config.yaml"]

  user:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: user
      args:
        VERSION: ${VERSION:-dev}
    container_name: kratos-user
    depends_on:
      migrate:
        condition: service_completed_successfully
      consul-init:
        condition: service_completed_successfully
    ports:
      - "9082:9082"
      - "9182:9182"
    environment:
      - CONSUL_ADDR=consul:8500
      - DB_DSN=postgres://postgres:postgres@postgres:5432/user_db?sslmode=disable
      - JWT_SECRET=dev-secret-change-in-prod-32-bytes!!
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    volumes:
      - ./configs:/configs:ro
    command: ["-conf", "/configs/user/config.yaml"]

volumes:
  postgres_data:
