version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: kratos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  consul:
    image: hashicorp/consul:1.15
    container_name: kratos-consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 5s
      timeout: 5s
      retries: 5

  consul-config:
    image: curlimages/curl:latest
    container_name: kratos-consul-config
    depends_on:
      consul:
        condition: service_healthy
    volumes:
      - ./configs:/configs:ro
      - ./init-consul-config.sh:/init-consul-config.sh:ro
    environment:
      - CONSUL_ADDR=consul:8500
    entrypoint: ["/bin/sh", "/init-consul-config.sh"]
    restart: "no"

  temporal:
    image: temporalio/auto-setup:1.22
    container_name: kratos-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    volumes:
      - ./temporal-config:/etc/temporal/config/dynamicconfig

  temporal-ui:
    image: temporalio/ui:2.21.3
    container_name: kratos-temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8088:8080"

  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: kratos-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: kratos-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.1.0
    container_name: kratos-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

  auth:
    build:
      context: ..
      dockerfile: app/auth/Dockerfile
    container_name: kratos-auth
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-config:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
      - "9081:9081"
    environment:
      - CONSUL_ADDR=consul:8500
      - CONSUL_CONFIG_PATH=config/auth/
      - DB_DSN=postgres://postgres:postgres@postgres:5432/auth_db?sslmode=disable
      - JAEGER_ENDPOINT=http://jaeger:4317
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  user:
    build:
      context: ..
      dockerfile: app/user/Dockerfile
    container_name: kratos-user
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-config:
        condition: service_completed_successfully
      auth:
        condition: service_healthy
    ports:
      - "8082:8082"
      - "9082:9082"
    environment:
      - CONSUL_ADDR=consul:8500
      - CONSUL_CONFIG_PATH=config/user/
      - DB_DSN=postgres://postgres:postgres@postgres:5432/user_db?sslmode=disable
      - JAEGER_ENDPOINT=http://jaeger:4317
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  asset:
    build:
      context: ..
      dockerfile: app/asset/Dockerfile
    container_name: kratos-asset
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-config:
        condition: service_completed_successfully
      auth:
        condition: service_healthy
    ports:
      - "8083:8083"
      - "9083:9083"
    environment:
      - CONSUL_ADDR=consul:8500
      - CONSUL_CONFIG_PATH=config/asset/
      - DB_DSN=postgres://postgres:postgres@postgres:5432/asset_db?sslmode=disable
      - JAEGER_ENDPOINT=http://jaeger:4317
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8083/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ..
      dockerfile: app/worker/Dockerfile
    container_name: kratos-worker
    depends_on:
      temporal:
        condition: service_started
      consul:
        condition: service_healthy
      consul-config:
        condition: service_completed_successfully
    ports:
      - "8084:8084"
    environment:
      - CONSUL_ADDR=consul:8500
      - CONSUL_CONFIG_PATH=config/worker/
      - TEMPORAL_ADDR=temporal:7233
      - JAEGER_ENDPOINT=http://jaeger:4317
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8084/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  gateway:
    build:
      context: ..
      dockerfile: app/gateway/Dockerfile
    container_name: kratos-gateway
    depends_on:
      consul:
        condition: service_healthy
      consul-config:
        condition: service_completed_successfully
      auth:
        condition: service_healthy
      user:
        condition: service_healthy
      asset:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - CONSUL_ADDR=consul:8500
      - CONSUL_CONFIG_PATH=config/gateway/
      - TEMPORAL_ADDR=temporal:7233
      - JAEGER_ENDPOINT=http://jaeger:4317
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
