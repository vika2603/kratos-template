openapi: 3.0.3
info:
  title: Gateway API
  version: 1.0.0
paths:
  /api/v1/echo:
    get:
      tags:
        - EchoService
      summary: echo name
      description: |-
        Echo is a test method to echo the message.
         ok
      operationId: EchoService_Echo
      parameters:
        - name: message
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoResponse'
  /api/v1/auth/login:
    post:
      tags:
        - AuthService
      operationId: AuthService_Login
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
        required: true
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /api/v1/auth/refresh:
    post:
      tags:
        - AuthService
      operationId: AuthService_Refresh
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                access_token:
                  type: string
        required: true
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
  /api/v1/auth/logout:
    post:
      tags:
        - AuthService
      operationId: AuthService_Logout
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                access_token:
                  type: string
        required: true
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
  /api/v1/users:
    get:
      tags:
        - UserService
      operationId: UserService_ListUsers
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            format: int32
        - name: page_size
          in: query
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsersResponse'
    post:
      tags:
        - UserService
      operationId: UserService_CreateUser
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
        required: true
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'
  /api/v1/users/{id}:
    get:
      tags:
        - UserService
      operationId: UserService_GetUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserResponse'
    put:
      tags:
        - UserService
      operationId: UserService_UpdateUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
        required: true
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserResponse'
    delete:
      tags:
        - UserService
      operationId: UserService_DeleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteUserResponse'
components:
  schemas:
    EchoResponse:
      type: object
      properties:
        message:
          type: string
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: string
          format: int64
    RefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: string
          format: int64
    LogoutResponse:
      type: object
      properties:
        success:
          type: boolean
    ListUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: string
          format: int64
    CreateUserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
    GetUserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
    UpdateUserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
    DeleteUserResponse:
      type: object
      properties:
        success:
          type: boolean
    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
tags:
  - name: EchoService
  - name: AuthService
  - name: UserService
