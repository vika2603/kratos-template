syntax = "proto3";

package kratos.conf;

option go_package = "kratos-template/pkg/conf;conf";

message Registry {
  message Consul {
    string address = 1;
    string scheme = 2;
  }
  Consul consul = 1;
}

message Log {
  string level = 1;
  string env = 2;
}

// Name and version are baked into the binary (see bootstrap.Run), not configured.
message Shared {
  Registry registry = 1;
  Log log = 2;
}
