syntax = "proto3";

package api.user.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "kratos-template/api/user/v1;v1";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  // Internal-only: auth calls this with a service token to verify a login; password hash never leaves this service.
  rpc VerifyCredentials(VerifyCredentialsRequest) returns (VerifyCredentialsResponse);
}

message User {
  string id = 1;
  string username = 2;
  string email = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message CreateUserRequest {
  string username = 1 [(buf.validate.field).string = {min_len: 3, max_len: 64}];
  string email = 2 [(buf.validate.field).string.email = true];
  string password = 3 [(buf.validate.field).string = {min_bytes: 8, max_bytes: 72}];
}

message CreateUserResponse {
  User user = 1;
}

message GetUserRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string username = 2 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string = {min_len: 3, max_len: 64}
  ];
  string email = 3 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.email = true
  ];
}

message UpdateUserResponse {
  User user = 1;
}

message DeleteUserRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteUserResponse {
  bool success = 1;
}

message ListUsersRequest {
  int32 page = 1 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).int32.gte = 1
  ];
  int32 page_size = 2 [(buf.validate.field).int32 = {gte: 0, lte: 100}];
}

message ListUsersResponse {
  repeated User users = 1;
  int32 total = 2;
}

message VerifyCredentialsRequest {
  string username = 1 [(buf.validate.field).string = {min_len: 1, max_len: 64}];
  string password = 2 [(buf.validate.field).string = {min_bytes: 8, max_bytes: 72}];
}

message VerifyCredentialsResponse {
  string user_id = 1;
  string username = 2;
}
